# NAMO Forced-Push Scenario (10x10)
# Robot MUST push the box — bypass path is walled off.
# This guarantees removal_cost != inf so PUSH is always unmasked.
# Used in Stage 1 training to teach the agent PUSH from day 1.
meta:
  name: "namo_push_only"
world:
  grid_size: 10
  cell_size: 1.0
  sim_steps: 1500
robots:
  - id: 3
    start: [2, 5]
    goal: [7, 5]
obstacles:
  - pos: [5, 5]  # Box directly blocking the path
walls:
  # Outer border handled by simulator
  # Create a tight corridor along row 5 — no bypass possible
  - pos: [1, 4]
  - pos: [2, 4]
  - pos: [3, 4]
  - pos: [4, 4]
  - pos: [5, 4]
  - pos: [6, 4]
  - pos: [7, 4]
  - pos: [8, 4]
  - pos: [1, 6]
  - pos: [2, 6]
  - pos: [3, 6]
  - pos: [4, 6]
  - pos: [5, 6]
  - pos: [6, 6]
  - pos: [7, 6]
  - pos: [8, 6]
