# NAMO Symmetric Bottleneck Deadlock — 15x15
# Two robots head-on in a corridor. Unlike single_corridor_yielding,
# the only escape pocket is at the exact centre [7,8].
# This tests the yielding logic: one robot must step into the pocket
# while the other passes, then resume.
meta:
  name: "symmetric_bottleneck_deadlock"
world:
  grid_size: 15
  cell_size: 1.0
  sim_steps: 1500
robots:
  - id: 3
    start: [2, 7]
    goal: [12, 7]
  - id: 4
    start: [12, 7]
    goal: [2, 7]
obstacles: []
walls:
  # Upper wall of corridor row 7 — no gap except [7,6] (upper pocket)
  - pos: [1, 6]
  - pos: [2, 6]
  - pos: [3, 6]
  - pos: [4, 6]
  - pos: [5, 6]
  - pos: [6, 6]
  # [7, 6] is open — upper yield pocket
  - pos: [8, 6]
  - pos: [9, 6]
  - pos: [10, 6]
  - pos: [11, 6]
  - pos: [12, 6]
  - pos: [13, 6]
  # Lower wall of corridor row 7 — full
  - pos: [1, 8]
  - pos: [2, 8]
  - pos: [3, 8]
  - pos: [4, 8]
  - pos: [5, 8]
  - pos: [6, 8]
  - pos: [7, 8]
  - pos: [8, 8]
  - pos: [9, 8]
  - pos: [10, 8]
  - pos: [11, 8]
  - pos: [12, 8]
  - pos: [13, 8]
