# NAMO Warehouse Large — 20x20 vertical aisle with 1 blocking box
# Two robots swap top and bottom. One box blocks the single-width aisle.
# NAMOUnc: bypass is impossible → REMOVE.
# Push pocket at [4,10] (right side at mid-point).
meta:
  name: "warehouse_large_20x20"
world:
  grid_size: 20
  cell_size: 1.0
  sim_steps: 2000
robots:
  - id: 3
    start: [3, 2]
    goal: [3, 17]
  - id: 4
    start: [3, 17]
    goal: [3, 2]
obstacles:
  - pos: [3, 10]   # single mid-aisle box
walls:
  # Left wall of aisle: col 2, rows 3-16
  - pos: [2, 3]
  - pos: [2, 4]
  - pos: [2, 5]
  - pos: [2, 6]
  - pos: [2, 7]
  - pos: [2, 8]
  - pos: [2, 9]
  - pos: [2, 10]
  - pos: [2, 11]
  - pos: [2, 12]
  - pos: [2, 13]
  - pos: [2, 14]
  - pos: [2, 15]
  - pos: [2, 16]
  # Right wall of aisle: col 4, rows 3-16, EXCEPT [4,10] which is the push pocket
  - pos: [4, 3]
  - pos: [4, 4]
  - pos: [4, 5]
  - pos: [4, 6]
  - pos: [4, 7]
  - pos: [4, 8]
  - pos: [4, 9]
  # [4, 10] is open — push pocket
  - pos: [4, 11]
  - pos: [4, 12]
  - pos: [4, 13]
  - pos: [4, 14]
  - pos: [4, 15]
  - pos: [4, 16]
