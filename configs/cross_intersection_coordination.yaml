# NAMO Cross Intersection Coordination — 15x15
# 4 robots meet at a + intersection. Each has an open 3-wide corridor
# so they can stagger through without deadlocking.
# The 3-cell wide arms give enough room for token-ring yielding.
meta:
  name: cross_intersection_coordination
world:
  grid_size: 15
  cell_size: 1.0
  sim_steps: 1500
obstacles: []
robots:
  - id: 3
    start: [2, 7]
    goal: [12, 7]
  - id: 4
    start: [12, 7]
    goal: [2, 7]
  - id: 5
    start: [7, 2]
    goal: [7, 12]
  - id: 6
    start: [7, 12]
    goal: [7, 2]
